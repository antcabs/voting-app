name: Docker Build, Scout and Push

on:
  push:
    branches:
      - main

jobs:
  build-scout-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/voting-app:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/voting-app:latest ./azure-vote

      - name: Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKER_USERNAME }}/voting-app:latest
          only-severities: critical,high
          exit-code: true

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/voting-app:latest
