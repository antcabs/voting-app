- name: Install deps and copy source code
  hosts: default
  gather_facts: false
  roles:
    - role: ./roles/deps/
      vars:
        pip_packages: ["redis", "flask", "requests"]
  tasks:
    - name: "Copy source code to container"
      ansible.builtin.copy:
        src: "./azure-vote"
        dest: "/app"
        mode: "550"
        